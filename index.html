<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ServeMap — Plan de salle live</title>
<style>
/* ==========================================================================
   ServeMap v2.1 — command center / boîte de nuit
   Priorité : lisible en plein rush. Peu de texte, gros repères visuels,
   une seule question à l'écran : « où je vais, quoi je fais ».
   ========================================================================== */
:root{
  --bg:#08060a; --bg-2:#100c12; --room:#151019; --room-2:#1d1626;
  --surface:rgba(28,22,36,.66); --surface-2:rgba(40,31,52,.78);
  --border:rgba(220,190,120,.16); --border-strong:rgba(220,190,120,.32);
  --ink:#f6efe0; --ink-dim:#c8bda6; --ink-faint:#8c8271;
  --cyan:#22d3ee; --magenta:#ff4fd8; --violet:#a78bfa;
  --gold:#e8c56a; --gold-2:#c9a24a;
  --green:#22e0a0; --amber:#ffb020; --blue:#38bdf8; --red:#ff3b6b;
  --shadow:0 18px 50px rgba(0,0,0,.55); --r:14px;
  --font:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--font); color:var(--ink);
  background:
    radial-gradient(1200px 700px at 12% -10%, rgba(232,197,106,.13), transparent 60%),
    radial-gradient(1000px 700px at 100% 0%, rgba(255,79,216,.09), transparent 55%),
    radial-gradient(900px 900px at 60% 120%, rgba(167,139,250,.09), transparent 60%),
    var(--bg);
  min-height:100%; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}
h1,h2,h3,h4{margin:0}
.mono{font-variant-numeric:tabular-nums}

/* ---------- Header ---------- */
header{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:11px 18px;background:linear-gradient(180deg, rgba(8,12,24,.96), rgba(8,12,24,.78));
  border-bottom:1px solid var(--border);backdrop-filter:blur(10px);
}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.logo{
  width:38px;height:38px;border-radius:11px;flex:none;
  background:conic-gradient(from 210deg,var(--gold),#2a1e0a,var(--violet),var(--gold));
  box-shadow:0 0 22px rgba(232,197,106,.42), inset 0 0 12px rgba(0,0,0,.5);
  display:grid;place-items:center;font-size:20px;
}
.brand h1{font-size:19px;letter-spacing:.5px}
.brand h1 b{color:var(--gold)}
.brand .tag{font-size:11px;color:var(--ink-faint);letter-spacing:2px;text-transform:uppercase}
.spacer{flex:1 1 auto}

.identity{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border-strong);border-radius:12px;padding:6px 8px 6px 12px}
.identity label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint)}
.identity select{
  appearance:none;background:var(--surface-2);color:var(--ink);border:1px solid var(--border);
  border-radius:9px;padding:8px 30px 8px 11px;font-size:14px;font-weight:600;min-height:40px;
  background-image:linear-gradient(45deg,transparent 50%,var(--gold) 50%),linear-gradient(135deg,var(--gold) 50%,transparent 50%);
  background-position:calc(100% - 16px) center,calc(100% - 11px) center;background-size:5px 5px,5px 5px;background-repeat:no-repeat;
}
.role-badge{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;padding:5px 10px;border-radius:999px;white-space:nowrap;border:1px solid currentColor}
.role-commis{color:var(--blue)} .role-serveur{color:var(--green)} .role-barmaid{color:var(--violet)} .role-manager{color:var(--magenta)}
.shift-pill{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-dim);background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:7px 13px}
.shift-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
.shift-pill.closed .dot{background:var(--ink-faint);box-shadow:none}

.btn{border:1px solid var(--border-strong);background:var(--surface-2);color:var(--ink);border-radius:11px;padding:10px 14px;font-size:13px;font-weight:600;min-height:42px;display:inline-flex;align-items:center;gap:8px;transition:.15s}
.btn:hover{border-color:var(--gold);box-shadow:0 0 0 1px rgba(232,197,106,.3)}
.btn.ghost{background:transparent}
.btn.primary{background:linear-gradient(120deg,rgba(232,197,106,.26),rgba(201,162,74,.16));border-color:var(--gold);color:#fff5da}
.btn.warn{border-color:var(--magenta);color:#ffe4fb}
.btn.tiny{padding:7px 10px;min-height:34px;font-size:12px;border-radius:9px}
.btn:disabled{opacity:.38;cursor:not-allowed;box-shadow:none;border-color:var(--border)}

/* ---------- Layout ---------- */
.wrap{display:flex;gap:16px;padding:16px;align-items:flex-start}
.map-col{flex:1 1 auto;min-width:0}
.rail{width:372px;flex:none;display:flex;flex-direction:column;gap:14px}
@media(max-width:1080px){ .wrap{flex-direction:column} .rail{width:100%;order:-1} }

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.panel-b{padding:14px 15px}

.banner{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px 13px;margin-bottom:12px;font-size:12.5px;color:var(--ink-dim)}
.banner b{color:var(--ink)}
.banner .x{margin-left:auto;background:transparent;border:none;color:var(--ink-faint);font-size:18px;width:28px;height:28px;border-radius:8px}
.banner .x:hover{color:var(--ink);background:var(--surface-2)}

/* ---------- Map ---------- */
.map-h{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.map-title{display:flex;align-items:baseline;gap:12px}
.map-title h2{font-size:17px;letter-spacing:.4px}
.map-title span{font-size:12px;color:var(--ink-faint)}
.legend{display:flex;gap:10px;flex-wrap:wrap}
.legend .lg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-dim)}
.legend .sw{width:11px;height:11px;border-radius:3px}

.mapframe{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--border-strong);
  background:radial-gradient(700px 380px at 30% 10%, rgba(34,211,238,.06), transparent 60%),
  radial-gradient(700px 380px at 90% 90%, rgba(255,79,216,.06), transparent 60%),var(--bg-2);box-shadow:var(--shadow)}
svg#floor{display:block;width:100%;height:auto;touch-action:none;user-select:none}

.zoneRegion{fill:var(--room);stroke:var(--border);stroke-width:1.5}
.zoneRegion.mine{stroke:rgba(232,197,106,.5)}
.zoneLabel{fill:var(--ink-faint);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.zoneLabel.clickable{cursor:pointer} .zoneLabel.clickable:hover{fill:var(--gold)}
.roomWall{fill:none;stroke:rgba(220,190,120,.28);stroke-width:3}
.roomInner{fill:none;stroke:rgba(220,190,120,.08);stroke-width:1;stroke-dasharray:3 7}
.entrance{fill:var(--green)} .entranceLabel{fill:var(--green);font-size:11px;font-weight:800;letter-spacing:2px}
.barShape{fill:url(#barGrad);stroke:var(--violet);stroke-width:2}
.barLabel{fill:#e9deff;font-size:13px;font-weight:800;letter-spacing:4px}
.barStool{fill:var(--room-2);stroke:rgba(167,139,250,.5);stroke-width:1.5}

.tbl{cursor:pointer;transition:opacity .25s}
.tbl .body{stroke-width:3}
.tbl .ring{fill:none;stroke-width:2;opacity:.45}
.tbl .ic{text-anchor:middle;font-size:22px;fill:#fff}
.tbl .nm{fill:var(--ink);font-size:12.5px;font-weight:700;text-anchor:middle}
.tbl.dim{opacity:.5}
.tbl.draggable{cursor:grab}
.pip circle{stroke:#05070d;stroke-width:2}
.pip text{font-size:13px;text-anchor:middle;dominant-baseline:central;font-weight:800}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes ringpulse{0%{r:40;opacity:.6}100%{r:56;opacity:0}}
.prio .pring{stroke:var(--red);animation:ringpulse 1.7s ease-out infinite}
.urgentpip{animation:pulse 1s ease-in-out infinite}
@media(prefers-reduced-motion:reduce){.prio .pring{animation:none}.urgentpip{animation:none}}

/* ---------- Rail : identité + « à faire » ---------- */
.idcard{display:flex;align-items:center;gap:12px}
.avatar{width:46px;height:46px;border-radius:13px;flex:none;display:grid;place-items:center;font-weight:800;font-size:18px;background:var(--surface-2);border:1px solid var(--border-strong)}
.idcard .who{font-size:16px;font-weight:700}
.idcard .cap{font-size:11.5px;color:var(--ink-faint);margin-top:2px}
.tabbody{padding:14px 15px}

.headline{font-size:12px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-faint);margin:2px 0 12px;display:flex;align-items:center;justify-content:space-between}
.cnt-inline{background:var(--magenta);color:#1a0016;font-weight:800;font-size:11px;border-radius:999px;padding:2px 9px}

.mcard{border:1px solid var(--border);border-left:5px solid var(--ink-faint);border-radius:14px;padding:13px 14px;margin-bottom:11px;background:var(--surface-2)}
.mcard .mtop{display:flex;align-items:center;gap:12px}
.mcard .micon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex:none}
.mcard .mtitle{font-size:15.5px;font-weight:800;line-height:1.15}
.mcard .mwhere{font-size:12.5px;color:var(--ink-dim);margin-top:2px}
.mcard .mtimer{margin-left:auto;font-size:12px;color:var(--ink-faint);white-space:nowrap;align-self:flex-start}
.mcard .msub{font-size:12.5px;color:var(--ink-dim);margin:10px 0 12px}
.mcard .macts{display:flex;gap:9px}
.mcard .macts .btn{flex:1;justify-content:center;min-height:46px;font-size:14px}
.mcard .macts .btn.ghost{flex:0 0 auto}

.calm{text-align:center;padding:34px 14px}
.calm .big{font-size:42px;line-height:1}
.calm h3{font-size:17px;margin:12px 0 6px}
.calm p{font-size:12.5px;color:var(--ink-faint);max-width:250px;margin:0 auto;line-height:1.5}

.mtoolbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mtoolbar .btn{flex-direction:column;gap:5px;min-height:66px;font-size:11.5px;justify-content:center}
.mtoolbar .btn .ic{font-size:21px}

.list-row{display:flex;align-items:center;gap:10px;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.list-row:last-child{border-bottom:none}
.list-row .l{min-width:0} .list-row .l b{font-size:13.5px}
.list-row .l small{display:block;color:var(--ink-faint);font-size:11px;margin-top:1px}
.stockbar{height:6px;border-radius:4px;background:var(--bg);overflow:hidden;margin-top:5px}
.stockbar i{display:block;height:100%;border-radius:4px}
.stat-disponible{color:var(--green)} .stat-bientot_epuise{color:var(--amber)} .stat-indisponible{color:var(--red)}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px}
.kpi .v{font-size:22px;font-weight:800;line-height:1} .kpi .k{font-size:11px;color:var(--ink-faint);margin-top:5px}
.muted{color:var(--ink-faint);font-size:12.5px;text-align:center;padding:16px 6px}
.hint{font-size:11.5px;color:var(--ink-faint);line-height:1.5}
.sect{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-faint);margin:14px 0 9px}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;z-index:80;background:rgba(3,5,12,.72);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
.modal{width:min(560px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border-strong);border-radius:18px;box-shadow:var(--shadow)}
.modal-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(12,18,36,.96);backdrop-filter:blur(6px)}
.modal-h h3{font-size:16px}
.modal-h .close{background:transparent;border:none;color:var(--ink-faint);font-size:24px;line-height:1;width:36px;height:36px;border-radius:9px}
.modal-h .close:hover{color:var(--ink);background:var(--surface)}
.modal-b{padding:18px}
.statustag{font-size:11px;font-weight:800;letter-spacing:.5px;padding:4px 10px;border-radius:999px;text-transform:uppercase;border:1px solid currentColor}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);color:var(--ink);border:1px solid var(--border-strong);border-radius:10px;padding:11px 12px;font-size:14px;font-family:inherit;min-height:44px}
.oline{display:grid;grid-template-columns:1fr 62px 78px 30px;gap:8px;align-items:center;margin-bottom:8px}
.oline input,.oline select{min-height:42px;padding:9px 10px;font-size:13px;width:100%;background:var(--bg);color:var(--ink);border:1px solid var(--border-strong);border-radius:9px}
.oline .rm{background:transparent;border:1px solid var(--border);color:var(--red);border-radius:9px;height:42px}
.grand{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--border);margin-top:6px;font-size:15px}
.grand b{font-size:22px;color:var(--gold)}
/* sélecteur de commande par catégorie */
.picker-tabs{display:flex;gap:6px;margin-bottom:12px}
.picker-tabs button{flex:1;padding:9px 6px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--ink-dim);font-weight:700;font-size:12px;min-height:44px}
.picker-tabs button.active{border-color:var(--gold);color:var(--gold);background:rgba(232,197,106,.10)}
.picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pchip{display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-align:left;padding:11px 12px;border-radius:11px;border:1px solid var(--border);background:var(--surface-2);color:var(--ink);min-height:56px;position:relative}
.pchip:hover{border-color:var(--gold)}
.pchip b{font-size:13.5px;font-weight:700;line-height:1.15}
.pchip small{font-size:12px;color:var(--gold)}
.pchip:disabled{opacity:.4;cursor:not-allowed}
.pchip:disabled small{color:var(--red)}
.pchip .qb{position:absolute;top:7px;right:7px;background:var(--gold);color:#241a05;font-size:11px;font-weight:800;border-radius:999px;min-width:19px;text-align:center;padding:1px 5px}
.cart{border-top:1px solid var(--border);padding-top:10px}
.cline{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.cline:last-child{border-bottom:none}
.cline .cn{flex:1;min-width:0} .cline .cn b{font-size:13.5px} .cline .cn small{display:block;color:var(--ink-faint);font-size:11px}
.stepper{display:flex;align-items:center;gap:2px}
.stepper button{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface-2);color:var(--ink);font-size:16px;font-weight:700}
.stepper span{min-width:26px;text-align:center;font-weight:700}
.cline .st{width:60px;text-align:right;font-size:13px;color:var(--ink-dim);font-variant-numeric:tabular-nums}
.cline .rm2{background:transparent;border:none;color:var(--red);font-size:18px;width:26px}
.suggests{margin-bottom:14px}
.sugg-row{display:flex;gap:8px;flex-wrap:wrap}
.sugg-chip{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border-radius:999px;border:1px dashed var(--gold);background:rgba(232,197,106,.06);color:var(--ink);font-size:12.5px;font-weight:600;min-height:40px}
.sugg-chip:hover{background:rgba(232,197,106,.13)}
.sugg-chip .pl{color:var(--gold);font-weight:800}
.sugg-chip .pr{color:var(--gold);font-size:11px}
.sugg-chip .qq{color:var(--ink-faint);font-size:11px}
/* onglets du rail : Ma mission / Salle en direct */
.railtabs{display:flex;gap:6px;margin-bottom:14px}
.railtabs button{flex:1;padding:9px 6px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--ink-faint);font-weight:700;font-size:12.5px;min-height:42px}
.railtabs button.active{border-color:var(--gold);color:var(--gold);background:rgba(232,197,106,.08)}
.det-lines .dl{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.det-lines .dl:last-child{border-bottom:none} .det-lines .dl .q{color:var(--ink-faint)}
.actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
.actions-grid .btn{justify-content:center}
.assignrow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin:4px 0 12px;font-size:13px;color:var(--ink-dim)}
.unassigned{color:var(--amber);font-weight:700}
.chip{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--surface);border:1px solid var(--border);color:var(--ink-dim)}
.stepcard{display:flex;gap:11px;align-items:flex-start;padding:11px 12px;border:1px solid var(--border);border-radius:12px;margin-bottom:9px;background:var(--surface-2)}
.stepcard .n{width:26px;height:26px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:800;font-size:12px;background:var(--bg);border:1px solid var(--border-strong)}
.stepcard.done{opacity:.55} .stepcard.done .n{background:var(--green);color:#022;border-color:var(--green)}
.stepcard .role{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.stepcard p{margin:3px 0 0;font-size:12.5px;color:var(--ink-dim)}
.stepcard button{margin-top:8px}

#toasts{position:fixed;left:50%;transform:translateX(-50%);bottom:22px;z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--surface-2);border:1px solid var(--border-strong);border-left:4px solid var(--cyan);color:var(--ink);padding:11px 16px;border-radius:11px;box-shadow:var(--shadow);font-size:13.5px;animation:tin .25s ease;max-width:92vw}
.toast.err{border-left-color:var(--red)} .toast.ok{border-left-color:var(--green)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.footnote{padding:8px 18px 26px;color:var(--ink-faint);font-size:11.5px;text-align:center}

/* ---------- FAB « + Commande » (toujours visible) ---------- */
.fab{position:fixed;right:22px;bottom:24px;z-index:70;display:none;align-items:center;gap:8px;
  padding:14px 20px;border-radius:999px;border:1px solid var(--gold);
  background:linear-gradient(120deg,var(--gold),var(--gold-2));color:#241a05;
  font-family:var(--font);font-size:15px;font-weight:800;letter-spacing:.2px;
  box-shadow:0 10px 30px rgba(232,197,106,.32),0 4px 12px rgba(0,0,0,.5);transition:transform .15s,box-shadow .15s}
.fab .plus{font-size:19px;line-height:1}
.fab:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(232,197,106,.45)}
.fab:active{transform:translateY(0)}
.fab.show{display:inline-flex}
body.modal-open .fab{display:none}

/* ---------- Vue mobile (serveurs en salle) ---------- */
.mtables{display:none}
.mtrow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:9px;color:var(--ink);min-height:58px}
.mtrow .dot{width:13px;height:13px;border-radius:50%;flex:none}
.mtrow .l{flex:1;min-width:0}
.mtrow .l b{font-size:15px}
.mtrow .l small{display:block;color:var(--ink-faint);font-size:12px;margin-top:2px}
.mtrow .chev{color:var(--ink-faint);font-size:22px;line-height:1}
.mobilenav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:60;gap:6px;background:rgba(14,10,18,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border-strong);padding:6px 8px calc(6px + env(safe-area-inset-bottom,0px))}
.mobilenav button{flex:1;background:transparent;border:none;color:var(--ink-faint);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:7px 4px;border-radius:12px;min-height:54px;position:relative}
.mobilenav button.active{color:var(--gold);background:rgba(232,197,106,.10)}
.mobilenav button .ic{font-size:19px;line-height:1}
.mobilenav .nbadge{position:absolute;top:5px;left:calc(50% + 4px);background:var(--magenta);color:#1a0016;font-size:9px;font-weight:800;border-radius:999px;padding:1px 5px}
@media(max-width:640px){
  header{gap:9px;padding:10px 12px}

<script>
"use strict";
/* ==========================================================================
   ServeMap v2.1 — logique métier inchangée (vérifiée), UI orientée rush.
   Toute mutation passe par `api` qui vérifie can(role, action).
   ========================================================================== */
/* ---------- Profil établissement (configurable — ici : Mirano) ----------
   Le moteur est générique ; un établissement = ce bloc + le seed.
   Pour un autre lieu : changez ESTAB + les zones/tables/produits du seed. */
const ESTAB = {
  name: "Mirano",
  city: "Bruxelles",
  kind: "club · ancien cinéma Art Déco",

const LS_KEY = "servemap_mirano_v2";
const now = () => Date.now();
const uid = (p) => p + "_" + Math.random().toString(36).slice(2, 8);
const SHIFT = "shift_soir";
const URGENT_AT = 70, PRIORITY_AT = 150;

/* Accords bouteille → mixers suggérés (proposés à la prise de commande) */
const PAIRINGS = [

function mixersFor(bottleName){ const p=PAIRINGS.find(x=>x.match.test(bottleName)); return p?p.mixers:[]; }

const CAN = {
  view_map:["commis","serveur","barmaid","manager"], view_prices:["serveur","manager"],

function can(role, action){ return (CAN[action]||[]).includes(role); }

/* ---------- Seed ---------- */

  const products = [
    // Bouteilles — champagnes & spiritueux (bottle service)
    { id:"p1",  name:"Dom Pérignon",         category:"bouteille", qty:6,   price:390 },

    // Coupes / shots
    { id:"p14", name:"Coupe champagne",      category:"verre", qty:90, price:16 },

  const orders = [

    { id:"o2", table_id:"t2", created_at:now()-70e3,  status:"envoyee",   payment_status:"impaye",      stock_deducted:false,

      lines:[ L("Ruinart Blanc de Blancs","bouteille",1,260) ] },                                                 // Carré 3
    { id:"o6", table_id:"t8", created_at:now()-300e3, status:"servie",    payment_status:"a_encaisser", stock_deducted:true,
      lines:[ L("Cocktail signature","verre",2,18), L("San Pellegrino","soft",2,8) ] },                           // Fumoir 1 — addition (Alex)
    { id:"o7", table_id:"t11",created_at:now()-15e3,  status:"en_attente",payment_status:"impaye",      stock_deducted:false,

      table_id:null, message:"Red Bull bientôt en rupture au bar central", urgency:"normal", status:"active", created_at:now()-30e3, resolved_at:null },
    { id:"n5", type:"renfort_demande", emitter_role:"serveur", emitter_id:"s2", scope:"zone",
      table_id:null, target_zone_id:"z1", message:"Besoin de renfort au balcon (carrés VIP)", urgency:"normal", status:"active", created_at:now()-20e3, resolved_at:null },
  ];
  const tableOverrides = [

    { id:"ov1", shift_id:SHIFT, table_id:"t3", server_id:"s2", previous_assignee:"z2", new_assignee:"s2",
      created_by:"s2", approved_by:"m1", reason:"Réservation VIP transférée", created_at:now()-1800e3, active_until:null },
  ];
  const tableOverrideRequests = [
    // Alex (sans délégation) demande Bar 2 (non assigné) -> le Responsable valide
    { id:"req1", shift_id:SHIFT, table_id:"t11", requested_by:"s1", reason:"Client m'a interpellé au bar",
      status:"pending", approved_by:null, created_at:now()-60e3, resolved_at:null },
    { id:"req0", shift_id:SHIFT, table_id:"t4", requested_by:"s2", reason:"—",

  ];

    { id:"h1", table:"Loge A", total:640,  at:now()-2600e3, server:"Alex" },

  return { staff, zones, shiftAssignments, staffPermissionOverrides, tables, products,
           orders, notifications, tableOverrides, tableOverrideRequests, history, shift:{id:SHIFT,closed:false} };
}

/* ---------- Store ---------- */
let S, currentStaffId = "s1", currentTodos = [];
function load(){ try{ const r=localStorage.getItem(LS_KEY); if(r){ S=JSON.parse(r); return; } }catch(e){} S=seed(); }
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){} }
function resetDemo(){ S=seed(); escalate(); currentStaffId="s1"; save(); buildIdentitySelect(); setIdentity("s1"); toast("Démo réinitialisée","ok"); }

const byId=(a,id)=>a.find(x=>x.id===id);
const staffById=id=>byId(S.staff,id);
const zoneById=id=>byId(S.zones,id);
const tableById=id=>byId(S.tables,id);
const currentStaff=()=>staffById(currentStaffId);
function activeOrder(tid){ return S.orders.find(o=>o.table_id===tid && o.status!=="archivee" && o.payment_status!=="paye"); }
function delegationOf(id){ const o=S.staffPermissionOverrides.find(x=>x.staff_id===id); return o?!!o.can_self_assign_tables:false; }

/* ---------- Résolution d'assignation : override > zone > non assignée ---------- */
function activeOverrideFor(tid){ return S.tableOverrides.find(o=>o.table_id===tid && (!o.active_until||o.active_until>now())); }
function activeShiftForServer(sid){ return S.shiftAssignments.find(sa=>sa.server_id===sid && !sa.active_until); }
function activeShiftForZone(zid){ return S.shiftAssignments.find(sa=>!sa.active_until && sa.zone_ids.includes(zid)); }
function resolveAssignment(t){
  const ov=activeOverrideFor(t.id);
  if(ov){ const sa=activeShiftForServer(ov.new_assignee); return {source:"override",server_id:ov.new_assignee,commis_ids:sa?sa.commis_ids:[]}; }
  const sa=activeShiftForZone(t.zone_id);
  if(sa) return {source:"zone",server_id:sa.server_id,commis_ids:sa.commis_ids};
  return {source:"unassigned",server_id:null,commis_ids:[]};
}
function assignLabel(t){
  const a=resolveAssignment(t);
  if(a.source==="unassigned") return {text:"Non assignée",unassigned:true,source:a.source,server_id:null,commis_ids:[]};
  const srv=staffById(a.server_id);
  const com=a.commis_ids.map(c=>{const s=staffById(c);return s?s.name:null;}).filter(Boolean).join(", ");
  return {text:`${srv?srv.name:"?"}${com?" · "+com:""}`,unassigned:false,source:a.source,server_id:a.server_id,commis_ids:a.commis_ids};
}
function isMine(t){
  const st=currentStaff(); if(!st) return false;
  const a=resolveAssignment(t);
  if(st.role==="manager") return true;
  if(st.role==="serveur") return a.server_id===st.id;
  if(st.role==="commis")  return a.commis_ids.includes(st.id);
  return false;
}
function staffCoversZone(st,zid){
  if(st.role==="manager") return true;
  if(st.role==="serveur"){ const sa=activeShiftForServer(st.id); return !!(sa&&sa.zone_ids.includes(zid)); }
  if(st.role==="commis"){ const sa=S.shiftAssignments.find(s=>!s.active_until&&s.commis_ids.includes(st.id)); return !!(sa&&sa.zone_ids.includes(zid)); }
  return false;
}

/* ---------- Notifications ---------- */
function ageSec(n){ return Math.max(0,(now()-n.created_at)/1000); }
function computedUrgency(n){ return ageSec(n)>=URGENT_AT?"urgent":"normal"; }
function activeNotifs(){ return S.notifications.filter(n=>n.status==="active"); }
function notifsForTable(tid){ return activeNotifs().filter(n=>n.table_id===tid); }
function canResolveNotif(n,st){
  switch(n.type){
    case "commande_envoyee": return st.role==="manager"||st.id===n.assigned_server_id;
    case "commande_prete":   return st.role==="manager"||st.id===n.assigned_server_id;
    case "stock_urgent":     return st.role==="barmaid"||st.role==="manager";
    case "renfort_demande":  return ["commis","serveur","barmaid","manager"].includes(st.role);
    case "bouteille_servie": return false;
    case "priorite_attente": return st.role==="manager";
    default: return false;
  }
}
/* pertinence pour la file « à faire » (évite le bruit inter-zones) */
function todoRelevant(n,st){
  if(n._isOverrideReq) return st.role==="manager";
  if(n.scope==="broadcast") return true;
  if(n.scope==="zone") return st.role==="manager"||staffCoversZone(st,n.target_zone_id);
  return st.role==="manager"||n.target_user_id===st.id||n.assigned_server_id===st.id;
}
function escalate(){
  let changed=false;
  S.tables.forEach(t=>{
    const ord=activeOrder(t.id);
    const open=notifsForTable(t.id).filter(n=>["commande_envoyee","commande_prete"].includes(n.type));
    const oldest=open.reduce((m,n)=>Math.min(m,n.created_at),Infinity);
    const overdue=(ord&&["envoyee","prete"].includes(ord.status)&&open.length&&(now()-oldest)/1000>=PRIORITY_AT);
    if(overdue&&t.status!=="priorite_attente"){
      t.status="priorite_attente"; changed=true;
      if(!S.notifications.some(n=>n.type==="priorite_attente"&&n.table_id===t.id&&n.status==="active")){
        const a=resolveAssignment(t);
        S.notifications.push({id:uid("n"),type:"priorite_attente",emitter_role:"manager",emitter_id:"system",
          scope:"zone",table_id:t.id,target_zone_id:t.zone_id,assigned_server_id:a.server_id,
          assigned_commis_id:a.commis_ids[0]||null,message:`${t.name} attend depuis longtemps`,
          urgency:"urgent",status:"active",created_at:oldest,resolved_at:null});
        changed=true;
      }
    }
  });
  activeNotifs().forEach(n=>{ const u=computedUrgency(n); if(n.urgency!==u){ n.urgency=u; changed=true; } });
  return changed;
}
function syncTableFromResolvedNotif(n){
  if(!n.table_id) return;
  const t=tableById(n.table_id); if(!t) return;
  const ord=activeOrder(t.id);
  if(n.type==="commande_envoyee"){ if(t.status==="commande_envoyee") t.status="commande_en_attente"; }
  else if(n.type==="commande_prete"){ t.status="servie"; if(ord){ ord.status="servie"; deductStock(ord); } }
  else if(n.type==="priorite_attente"){ t.status=ord?"servie":"libre"; }
}
function deductStock(order){
  if(order.stock_deducted) return;
  order.lines.forEach(l=>{ const p=S.products.find(x=>x.name===l.name); if(p) p.qty=Math.max(0,p.qty-l.qty); });
  order.stock_deducted=true;
}
function stockStatus(q){ return q>20?"disponible":(q>0?"bientot_epuise":"indisponible"); }

/* ---------- API (autorisations vérifiées ici) ---------- */

    const t=tableById(tid);
    S.notifications.push({id:uid("n"),type:"bouteille_servie",emitter_role:st.role,emitter_id:st.id,scope:"private",

  requestRenfort(zid,msg){
    const st=currentStaff(); if(!can(st.role,"request_renfort")) return this._deny("demander du renfort");
    S.notifications.push({id:uid("n"),type:"renfort_demande",emitter_role:st.role,emitter_id:st.id,scope:zid?"zone":"broadcast",

    else{ ord={id:uid("o"),table_id:tid,created_at:now(),status:"en_attente",payment_status:"impaye",stock_deducted:false,lines}; S.orders.push(ord); }

    else{

    const req=byId(S.tableOverrideRequests,rid); if(!req||req.status!=="pending") return;

    const req=byId(S.tableOverrideRequests,rid); if(!req||req.status!=="pending") return;

  _applyOverride(req){
    const t=tableById(req.table_id); const prev=resolveAssignment(t);
    S.tableOverrides.push({id:uid("ov"),shift_id:SHIFT,table_id:req.table_id,server_id:req.requested_by,

      created_by:req.requested_by,approved_by:req.approved_by,reason:req.reason,created_at:now(),active_until:null});

    save(); renderAll(); toast(`Délégation ${o.can_self_assign_tables?"activée":"désactivée"} — ${staffById(sid).name}`,"ok");
  },
  closeShift(){ if(!can(currentStaff().role,"close_shift")) return this._deny("clôturer le service"); S.shiftAssignments.forEach(sa=>{ if(!sa.active_until) sa.active_until=now(); }); S.shift.closed=true; save(); renderAll(); toast("Service clôturé","ok"); },
};

/* ---- drag (manager) / clic ---- */
let dragState=null;
function clientToSvg(cx,cy){ const p=svg.createSVGPoint(); p.x=cx; p.y=cy; const m=svg.getScreenCTM(); if(!m) return {x:0,y:0}; const q=p.matrixTransform(m.inverse()); return {x:q.x,y:q.y}; }
function bindMapEvents(){
  svg.querySelectorAll("[data-zone]").forEach(el=>el.addEventListener("click",e=>{ e.stopPropagation(); openRenameZone(el.getAttribute("data-zone")); }));
  svg.querySelectorAll("[data-table]").forEach(g=>{
    const id=g.getAttribute("data-table");
    g.addEventListener("pointerdown",e=>{
      const draggable=can(currentStaff().role,"edit_floorplan"); const p=clientToSvg(e.clientX,e.clientY);
      dragState={id,moved:false,startX:p.x,startY:p.y,draggable,g,lastX:null,lastY:null};
      if(draggable){ try{ g.setPointerCapture(e.pointerId); }catch(_){} }
    });
    g.addEventListener("pointermove",e=>{
      if(!dragState||dragState.id!==id) return;
      const p=clientToSvg(e.clientX,e.clientY);
      if(Math.abs(p.x-dragState.startX)>4||Math.abs(p.y-dragState.startY)>4) dragState.moved=true;
      if(dragState.draggable&&dragState.moved){ const x=Math.max(60,Math.min(940,p.x)),y=Math.max(60,Math.min(580,p.y)); g.setAttribute("transform",`translate(${x},${y})`); dragState.lastX=x; dragState.lastY=y; }
    });
    const end=()=>{
      if(!dragState||dragState.id!==id) return;
      if(dragState.draggable&&dragState.moved&&dragState.lastX!=null) api.moveTable(id,dragState.lastX,dragState.lastY);
      else if(!dragState.moved) openTableDetail(id);
      dragState=null;
    };
    g.addEventListener("pointerup",end); g.addEventListener("pointercancel",end);
  });
}

      if(todos.some(td=>td.tableId===t.id)) return;

        sub:"Transmets le bon au bar",primary:{label:"Envoyer au bar",act:()=>api.emitCommandeEnvoyee(t.id)}});
    });
  }
  if(st.role==="barmaid"){
    S.tables.filter(t=>{const o=activeOrder(t.id);return o&&o.status==="envoyee";}).forEach(t=>{
      if(todos.some(td=>td.tableId===t.id)) return;
      todos.push({tableId:t.id,color:STATUS.commande_prete.color,icon:"🍾",title:"Bouteille à préparer",where:t.name,since:activeOrder(t.id).created_at,
        sub:"Prépare (cierge) puis signale au serveur",primary:{label:"Prête ✓",act:()=>api.emitCommandePrete(t.id)}});
    });
  }
  if(st.role==="commis"){
    // le runner VOIT « bouteille prête » de son binôme (info, sans pouvoir la clôturer)
    activeNotifs().forEach(n=>{
      if(n.type!=="commande_prete"||n.assigned_commis_id!==st.id) return;
      if(todos.some(td=>td.notifId===n.id)) return;
      const t=tableById(n.table_id);
      todos.push({tableId:n.table_id,notifId:n.id,readonly:true,color:NTYPE.commande_prete.color,icon:"🍾",since:n.created_at,
        title:"Bouteille prête",where:t?t.name:"Salle",sub:"Le bar a sorti la commande — va aider à la monter",info:"Le serveur clôture"});
    });
  }
  todos.sort((a,b)=>(a.since||now())-(b.since||now()));
  return todos;
}

function bindRail(){
  const body=document.getElementById("tabbody");
  body.querySelectorAll("[data-todo]").forEach(b=>b.addEventListener("click",()=>{ const td=currentTodos[+b.getAttribute("data-todo")]; if(td&&td.primary) td.primary.act(); }));
  body.querySelectorAll("[data-open]").forEach(b=>b.addEventListener("click",()=>openTableDetail(b.getAttribute("data-open"))));
  body.querySelectorAll("[data-act]").forEach(b=>{
    const act=b.getAttribute("data-act");
    b.addEventListener("click",()=>{

const overlay=document.getElementById("overlay"), modal=document.getElementById("modal");
function openModal(html){ modal.innerHTML=html; overlay.classList.add("on"); document.body.classList.add("modal-open"); }
function closeModal(){ overlay.classList.remove("on"); modal.innerHTML=""; document.body.classList.remove("modal-open"); }
overlay.addEventListener("click",e=>{ if(e.target===overlay) closeModal(); });
function modalHead(title,right){ return `<div class="modal-h"><h3>${title}</h3><div style="display:flex;align-items:center;gap:10px">${right||""}<button class="close" data-close>×</button></div></div>`; }
function bindClose(){ modal.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click",closeModal)); }

function openTableDetail(tid){
  const st=currentStaff(), t=tableById(tid), sm=STATUS[t.status], a=assignLabel(t), o=activeOrder(tid), showPrice=can(st.role,"view_prices"), z=zoneById(t.zone_id);
  let lines = (o&&o.lines.length)
    ? `<div class="det-lines">${o.lines.map(l=>`<div class="dl"><span>${CAT[l.category].icon} ${svgEsc(l.name)} <span class="q">×${l.qty}</span></span><span>${showPrice?l.total+"€":"•••"}</span></div>`).join("")}<div class="dl"><b>Total</b><b style="color:var(--gold)">${showPrice?orderTotal(o)+"€":"•••"}</b></div></div>`
    : `<p class="hint">Aucune commande active sur cette table.</p>`;
  let acts=[];
  if(can(st.role,"create_order")) acts.push(`<button class="btn primary" data-a="neworder">＋ Nouvelle commande</button>`);
  if(o&&can(st.role,"emit_bouteille_servie")) acts.push(`<button class="btn" data-a="servie">🍾 Bouteille servie</button>`);
  if(o&&can(st.role,"encaisser")&&t.status!=="a_encaisser") acts.push(`<button class="btn warn" data-a="aencaisser">€ À encaisser</button>`);
  if(o&&can(st.role,"encaisser")&&t.status==="a_encaisser") acts.push(`<button class="btn primary" data-a="encaisser">✓ Encaisser & libérer</button>`);
  if(st.role==="commis"&&can(st.role,"emit_commande_envoyee")) acts.push(`<button class="btn primary" data-a="envoyee">➤ Envoyer au bar</button>`);
  if(st.role==="barmaid"&&can(st.role,"emit_commande_prete")) acts.push(`<button class="btn primary" data-a="prete">✔ Signaler prête</button>`);
  if(o) acts.push(`<button class="btn ghost" data-a="archiver">🗄 Archiver</button>`);
  notifsForTable(tid).forEach(n=>{ if(canResolveNotif(n,st)) acts.push(`<button class="btn" data-a="resolve" data-n="${n.id}">✓ ${NTYPE[n.type].label}</button>`); });
  if(st.role==="serveur"&&a.server_id!==st.id) acts.push(`<button class="btn" data-a="take">✋ Prendre cette table</button>`);
  openModal(`${modalHead(svgEsc(t.name),`<span class="statustag" style="color:${sm.color}">${sm.icon} ${sm.label}</span>`)}
    <div class="modal-b">
      <div class="assignrow"><span>${svgEsc(z.name)} · ${t.seats} places${t.min?` · <span style="color:var(--amber)">min. ${t.min}€</span>`:""}</span><span>·</span>
        <span class="${a.unassigned?'unassigned':''}">${a.unassigned?"⚠ Non assignée":("Assignée : "+a.text)}</span>
        ${a.source==="override"?`<span class="chip">override</span>`:a.source==="zone"?`<span class="chip">zone</span>`:""}</div>
      ${lines}
      ${!showPrice?`<p class="hint">🔒 Prix & encaissement réservés au serveur/manager.</p>`:""}
      <div class="actions-grid">${acts.join("")||`<p class="hint">Rien à faire ici pour ton rôle — c'est déjà géré.</p>`}</div>
    </div>`);
  bindClose();
  modal.querySelectorAll("[data-a]").forEach(b=>{ const a2=b.getAttribute("data-a");
    b.addEventListener("click",()=>{
      if(a2==="neworder"){ openNewOrder(tid); return; }
      if(a2==="take"){ closeModal(); openTakeTable(tid); return; }
      if(a2==="servie") api.emitBouteilleServie(tid);
      else if(a2==="aencaisser") api.setTableStatus(tid,"a_encaisser");
      else if(a2==="encaisser") api.encaisser(tid);
      else if(a2==="envoyee") api.emitCommandeEnvoyee(tid);
      else if(a2==="prete") api.emitCommandePrete(tid);
      else if(a2==="archiver") api.archiver(tid);
      else if(a2==="resolve") api.resolveNotif(b.getAttribute("data-n"));
      closeModal();
    });
  });
}

function openNewOrder(presetTable){
  const st=currentStaff(); if(!can(st.role,"create_order")){ toast("Réservé au serveur / manager","err"); return; }
  const assignable=S.tables.filter(t=>{const a=resolveAssignment(t);return st.role==="manager"||a.server_id===st.id||a.source==="unassigned";});
  const opts=presetTable?S.tables:(assignable.length?assignable:S.tables);
  let tid=presetTable||(opts[0]&&opts[0].id)||S.tables[0].id;
  let cat="bouteille";
  const cart={};      // productId -> qty
  const customs=[];   // {name, price, qty}
  const CATTABS=[["bouteille","🍾 Bouteilles"],["verre","🥂 Verres"],["soft","🥤 Softs"],["autre","✎ Autre"]];
  const total=()=>{ let t=0; for(const pid in cart){ const p=byId(S.products,pid); if(p) t+=p.price*cart[pid]; } customs.forEach(c=>t+=c.price*c.qty); return t; };
  const count=()=>{ let n=0; for(const k in cart) n+=cart[k]; customs.forEach(c=>n+=c.qty); return n; };
  function suggestedMixers(){
    const bottles=Object.keys(cart).map(pid=>byId(S.products,pid)).filter(p=>p&&p.category==="bouteille");
    const names=new Set(); bottles.forEach(b=>mixersFor(b.name).forEach(m=>names.add(m)));
    return [...names].map(nm=>S.products.find(p=>p.name===nm)).filter(p=>p&&p.qty>0);
  }

  function render(){
    const tableSel=`<select id="noTable">${opts.map(t=>`<option value="${t.id}" ${t.id===tid?"selected":""}>${t.name} — ${zoneById(t.zone_id).name}</option>`).join("")}</select>`;
    const tabs=CATTABS.map(([k,l])=>`<button data-cat="${k}" class="${cat===k?"active":""}">${l}</button>`).join("");
    let grid;
    if(cat==="autre"){
      grid=`<div style="display:grid;grid-template-columns:1fr 82px auto;gap:8px;margin-bottom:14px">
        <input id="cName" placeholder="Nom de l'article" style="background:var(--bg);color:var(--ink);border:1px solid var(--border-strong);border-radius:9px;padding:10px;min-height:44px">
        <input id="cPrice" type="number" min="0" inputmode="numeric" placeholder="€" style="background:var(--bg);color:var(--ink);border:1px solid var(--border-strong);border-radius:9px;padding:10px;min-height:44px">
        <button class="btn" id="cAdd" style="min-height:44px">Ajouter</button></div>`;
    } else {
      const items=S.products.filter(p=>p.category===cat);
      grid=`<div class="picker-grid">${items.map(p=>{ const out=p.qty<=0,q=cart[p.id]||0;
        return `<button class="pchip" data-add="${p.id}" ${out?"disabled":""}><b>${svgEsc(p.name)}</b><small>${out?"épuisé":p.price+"€"}</small>${q?`<span class="qb">${q}</span>`:""}</button>`;
      }).join("")}</div>`;
    }
    const lines=[];
    for(const pid in cart){ const p=byId(S.products,pid); if(p) lines.push({key:"p:"+pid,name:p.name,cat:p.category,price:p.price,qty:cart[pid]}); }
    customs.forEach((c,i)=>lines.push({key:"c:"+i,name:c.name||"Article",cat:"autre",price:c.price,qty:c.qty}));
    const cartHtml=lines.length ? lines.map(l=>`<div class="cline">
        <div class="cn"><b>${CAT[l.cat].icon} ${svgEsc(l.name)}</b><small>${l.price}€ / u</small></div>
        <div class="stepper"><button data-dec="${l.key}">−</button><span>${l.qty}</span><button data-inc="${l.key}">＋</button></div>
        <div class="st">${l.price*l.qty}€</div><button class="rm2" data-rmk="${l.key}">×</button></div>`).join("")
      : `<p class="hint" style="text-align:center;padding:14px 4px">Touchez un produit pour l'ajouter à la commande.</p>`;
    const sugg=suggestedMixers();
    const suggHtml=sugg.length?`<div class="suggests"><div class="sect" style="margin:2px 0 8px">💡 Suggestions pour ta bouteille</div>
      <div class="sugg-row">${sugg.map(p=>`<button class="sugg-chip" data-add="${p.id}"><span class="pl">＋</span> ${svgEsc(p.name)} <span class="pr">${p.price}€</span>${cart[p.id]?`<span class="qq">×${cart[p.id]}</span>`:""}</button>`).join("")}</div></div>`:"";
    openModal(`${modalHead("Nouvelle commande")}<div class="modal-b">
      <div class="field"><label>Table</label>${tableSel}</div>
      <div class="picker-tabs">${tabs}</div>
      ${grid}
      ${suggHtml}
      <div class="cart"><div class="headline" style="margin:0 0 8px"><span>La commande</span>${count()?`<span class="cnt-inline">${count()}</span>`:""}</div>${cartHtml}</div>
      <div class="grand"><span>Total</span><b>${total()}€</b></div>
      <div style="display:flex;gap:10px"><button class="btn ghost" data-close style="flex:1">Annuler</button>
        <button class="btn primary" id="saveOrder" style="flex:2" ${count()?"":"disabled"}>Enregistrer${count()?` · ${total()}€`:""}</button></div>
    </div>`);
    bindClose();
    modal.querySelector("#noTable").addEventListener("change",e=>{ tid=e.target.value; });
    modal.querySelectorAll("[data-cat]").forEach(b=>b.addEventListener("click",()=>{ cat=b.getAttribute("data-cat"); render(); }));
    modal.querySelectorAll("[data-add]").forEach(b=>b.addEventListener("click",()=>{ const pid=b.getAttribute("data-add"); cart[pid]=(cart[pid]||0)+1; render(); }));
    modal.querySelectorAll("[data-inc]").forEach(b=>b.addEventListener("click",()=>{ step(b.getAttribute("data-inc"),1); render(); }));
    modal.querySelectorAll("[data-dec]").forEach(b=>b.addEventListener("click",()=>{ step(b.getAttribute("data-dec"),-1); render(); }));
    modal.querySelectorAll("[data-rmk]").forEach(b=>b.addEventListener("click",()=>{ rmKey(b.getAttribute("data-rmk")); render(); }));
    const cAdd=modal.querySelector("#cAdd");
    if(cAdd) cAdd.addEventListener("click",()=>{ const n=modal.querySelector("#cName").value.trim(),pr=Math.max(0,+modal.querySelector("#cPrice").value||0); if(n){ customs.push({name:n,price:pr,qty:1}); render(); } else toast("Nomme l'article","err"); });
    modal.querySelector("#saveOrder").addEventListener("click",()=>{
      const target=modal.querySelector("#noTable").value, orderLines=[];
      for(const pid in cart){ const p=byId(S.products,pid); if(p&&cart[pid]>0) orderLines.push({name:p.name,category:p.category,qty:cart[pid],unit_price:p.price}); }
      customs.forEach(c=>{ if(c.qty>0&&c.name) orderLines.push({name:c.name,category:"autre",qty:c.qty,unit_price:c.price}); });
      if(api.createOrder(target,orderLines)) closeModal();
    });
    function step(key,d){
      if(key[0]==="p"){ const pid=key.slice(2); cart[pid]=(cart[pid]||0)+d; if(cart[pid]<=0) delete cart[pid]; }
      else { const i=+key.slice(2); if(customs[i]){ customs[i].qty+=d; if(customs[i].qty<=0) customs.splice(i,1); } }
    }
    function rmKey(key){ if(key[0]==="p") delete cart[key.slice(2)]; else customs.splice(+key.slice(2),1); }
  }
  render();
}

function openRenfort(){
  const zoneOpts=`<option value="">Toute la salle (broadcast)</option>`+S.zones.map(z=>`<option value="${z.id}">${z.name}</option>`).join("");
  openModal(`${modalHead("Demander du renfort")}<div class="modal-b">
    <div class="field"><label>Zone concernée</label><select id="rfZone">${zoneOpts}</select></div>
    <div class="field"><label>Message</label><input id="rfMsg" placeholder="Ex : besoin de renfort terrasse"></div>
    <div style="display:flex;gap:10px"><button class="btn ghost" data-close style="flex:1">Annuler</button><button class="btn primary" id="rfGo" style="flex:2">Diffuser</button></div></div>`);
  bindClose();
  modal.querySelector("#rfGo").addEventListener("click",()=>{ api.requestRenfort(modal.querySelector("#rfZone").value||null,modal.querySelector("#rfMsg").value); closeModal(); });
}
function openStockUrgent(){
  openModal(`${modalHead("Signaler un stock urgent")}<div class="modal-b">
    <div class="field"><label>Message</label><input id="suMsg" placeholder="Ex : plus de glaçons au bar principal"></div>
    <div style="display:flex;gap:10px"><button class="btn ghost" data-close style="flex:1">Annuler</button><button class="btn warn" id="suGo" style="flex:2">Diffuser l'alerte</button></div></div>`);
  bindClose();
  modal.querySelector("#suGo").addEventListener("click",()=>{ api.signalStockUrgent(modal.querySelector("#suMsg").value); closeModal(); });
}

/* ---- console manager ---- */
function openRecapModal(){
  const served=S.orders.filter(o=>o.status==="servie"||o.status==="archivee");
  const encaisse=S.history.reduce((s,h)=>s+h.total,0);
  const activeTables=S.tables.filter(t=>t.status!=="libre").length;
  const low=S.products.filter(p=>p.qty<=20);
  const overrides=S.tableOverrides.length, denied=S.tableOverrideRequests.filter(r=>r.status==="denied").length;
  const pendingOrders=S.orders.filter(o=>o.status==="en_attente"||o.status==="envoyee").length;
  const za={}; S.tables.forEach(t=>{ if(t.status!=="libre") za[t.zone_id]=(za[t.zone_id]||0)+1; });
  const topZones=Object.entries(za).sort((a,b)=>b[1]-a[1]).map(([z,c])=>`${zoneById(z).name} (${c})`).join(", ")||"—";
  let h=`<div class="modal-b">
    <div class="kpis">
      <div class="kpi"><div class="v stat-disponible">${encaisse}€</div><div class="k">Encaissé (service)</div></div>
      <div class="kpi"><div class="v">${served.length}</div><div class="k">Commandes servies</div></div>
      <div class="kpi"><div class="v">${activeTables}</div><div class="k">Tables actives</div></div>
      <div class="kpi"><div class="v">${pendingOrders}</div><div class="k">En attente</div></div>
      <div class="kpi"><div class="v stat-bientot_epuise">${low.length}</div><div class="k">Bientôt épuisés</div></div>
      <div class="kpi"><div class="v">${overrides}</div><div class="k">Overrides effectués</div></div>
    </div>
    <div class="sect">Frictions (à surveiller)</div>
    <div class="list-row"><div class="l"><b>${denied}</b><small>demande(s) d'assignation refusée(s)</small></div></div>
    <div class="list-row"><div class="l"><b>Zones les plus actives</b><small>${topZones}</small></div></div>
    <div class="sect">Produits bientôt épuisés</div>
    ${low.length?low.map(p=>`<div class="list-row"><div class="l"><b>${svgEsc(p.name)}</b><small class="stat-${stockStatus(p.qty)}">${p.qty} en stock</small></div></div>`).join(""):`<div class="muted">Stock sain.</div>`}
    <div class="sect">Historique du service</div>
    ${S.history.length?S.history.map(x=>`<div class="list-row"><div class="l"><b>${svgEsc(x.table)}</b><small>${x.server} · il y a ${rel(x.at)}</small></div><div><b>${x.total}€</b></div></div>`).join(""):`<div class="muted">Aucune commande archivée.</div>`}
  </div>`;
  openModal(modalHead("📊 Récap du service")+h); bindClose();
}
function openStockModal(){
  const st=currentStaff(), canEdit=can(st.role,"manage_stock"), showP=can(st.role,"view_prices");
  const low=S.products.filter(p=>p.qty<=20).length;
  let h=`<div class="modal-b">
    <div class="kpis" style="margin-bottom:12px">
      <div class="kpi"><div class="v">${S.products.length}</div><div class="k">Références</div></div>
      <div class="kpi"><div class="v stat-bientot_epuise">${low}</div><div class="k">À réapprovisionner</div></div>
    </div>`;
  ["bouteille","verre","soft","autre"].forEach(ck=>{
    const items=S.products.filter(p=>p.category===ck); if(!items.length) return;
    h+=`<div class="sect">${CAT[ck].icon} ${CAT[ck].label}</div>`;
    items.forEach(p=>{ const ss=stockStatus(p.qty),pct=Math.min(100,p.qty/60*100),bc=ss==="disponible"?"var(--green)":ss==="bientot_epuise"?"var(--amber)":"var(--red)";
      h+=`<div class="list-row"><div class="l" style="flex:1"><b>${svgEsc(p.name)}</b>
        <small class="stat-${ss}">${p.qty} en stock · ${ss.replace("_"," ")}${showP?` · ${p.price}€`:""}</small>
        <div class="stockbar"><i style="width:${pct}%;background:${bc}"></i></div></div>
        ${canEdit?`<div style="display:flex;gap:6px"><button class="btn tiny" data-stk="${p.id}" data-d="-1">−</button><button class="btn tiny" data-stk="${p.id}" data-d="1">＋</button></div>`:""}</div>`;
    });
  });
  h+=`</div>`;
  openModal(modalHead("📦 Stock")+h); bindClose();
  modal.querySelectorAll("[data-stk]").forEach(b=>b.addEventListener("click",()=>{ api.adjustStock(b.getAttribute("data-stk"),+b.getAttribute("data-d")); openStockModal(); }));
}
function openTeamModal(){
  let h=`<div class="modal-b"><div class="sect">Délégation « prendre une table »</div>`;
  S.staff.filter(s=>s.role==="serveur").forEach(s=>{ const on=delegationOf(s.id);
    h+=`<div class="list-row"><div class="l"><b>${s.name}</b><small>${on?"peut s'auto-assigner une table":"passe par ta validation"}</small></div>
      <button class="btn tiny ${on?'primary':'ghost'}" data-deleg="${s.id}">${on?"Activée":"Désactivée"}</button></div>`; });
  h+=`<div class="sect" style="margin-top:16px">Plan de salle</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">${S.zones.map(z=>`<button class="btn tiny" data-add="${z.id}">＋ ${svgEsc(z.name)}</button>`).join("")}</div>
    <p class="hint" style="margin-top:8px">Glisse une table sur la map pour la déplacer. Touche un nom de zone pour le renommer.</p>
    <div class="sect" style="margin-top:16px">Service</div>
    ${S.shift.closed?`<p class="hint">Service clôturé.</p>`:`<button class="btn warn" data-close-shift style="width:100%;justify-content:center">⏹ Clôturer le service</button>`}
  </div>`;
  openModal(modalHead("👥 Équipe & plan")+h); bindClose();
  modal.querySelectorAll("[data-deleg]").forEach(b=>b.addEventListener("click",()=>{ api.toggleDelegation(b.getAttribute("data-deleg")); openTeamModal(); }));
  modal.querySelectorAll("[data-add]").forEach(b=>b.addEventListener("click",()=>{ api.addTable(b.getAttribute("data-add")); closeModal(); }));
  const cs=modal.querySelector("[data-close-shift]"); if(cs) cs.addEventListener("click",()=>{ api.closeShift(); openTeamModal(); });
}

/* ---- démo guidée ---- */
function openDemoModal(){
  const t1=tableById("t1"),t2=tableById("t2");
  const steps=[
    {role:"commis",who:"Sam",id:"c1",txt:"transmet le bon de la Loge A au bar",done:t1.status!=="commande_en_attente"},
    {role:"barmaid",who:"Lea",id:"b1",txt:"prépare la bouteille et signale « Loge B prête »",done:["commande_prete","servie","a_encaisser"].includes(t2.status)},
    {role:"serveur",who:"Alex",id:"s1",txt:"voit l'alerte sur la map → « Servie ✓ ». La loge change de statut toute seule.",done:["servie","a_encaisser"].includes(t2.status)},
    {role:"manager",who:"Nora",id:"m1",txt:"suit le récap, les demandes et les frictions",done:false},
  ];
  const cv={commis:"blue",serveur:"green",barmaid:"violet",manager:"magenta"};
  let h=`<div class="modal-b"><p class="hint" style="margin-bottom:12px">Un service coordonné <b>sans se parler</b>. Suivez les 4 étapes en changeant de rôle — la salle réagit en direct.</p>`;
  steps.forEach((s,i)=>{ h+=`<div class="stepcard ${s.done?"done":""}"><div class="n">${s.done?"✓":i+1}</div>
    <div style="flex:1"><span class="role" style="color:var(--${cv[s.role]})">${ROLE_LABEL[s.role]} · ${s.who}</span><p>${s.txt}</p>
    <button class="btn tiny" data-demo="${s.id}">Incarner ${s.who} →</button></div></div>`; });
  h+=`</div>`;
  openModal(modalHead("▶ Démo guidée")+h); bindClose();
  modal.querySelectorAll("[data-demo]").forEach(b=>b.addEventListener("click",()=>{ closeModal(); setIdentity(b.getAttribute("data-demo")); }));
}

/* ==========================================================================
   Header / identité
   ========================================================================== */
function buildIdentitySelect(){
  const sel=document.getElementById("who"), order=["serveur","commis","barmaid","manager"];
  sel.innerHTML=order.map(role=>`<optgroup label="${ROLE_LABEL[role]}">${S.staff.filter(s=>s.role===role).map(s=>`<option value="${s.id}">${s.name} — ${ROLE_LABEL[role]}</option>`).join("")}</optgroup>`).join("");
  sel.value=currentStaffId; sel.onchange=()=>setIdentity(sel.value);
}
function setIdentity(id){
  currentStaffId=id;
  const sel=document.getElementById("who"); if(sel.value!==id) sel.value=id;
  const st=currentStaff(), rb=document.getElementById("roleBadge");
  rb.textContent=ROLE_LABEL[st.role]; rb.className="role-badge role-"+st.role;
  save(); renderAll();
}
function updateShiftPill(){
  const pill=document.getElementById("shiftPill"), txt=document.getElementById("shiftText");
  if(S.shift.closed){ pill.classList.add("closed"); txt.textContent="Service clôturé"; }
  else{ pill.classList.remove("closed"); txt.textContent="Service en cours"; }
}

/* ---- toast + timers ---- */
function toast(msg,kind){
  const el=document.createElement("div"); el.className="toast "+(kind||""); el.textContent=msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(()=>el.remove(),300); },2600);
}
function rel(ts){ const s=Math.max(0,(now()-ts)/1000); return s<60?Math.floor(s)+"s":s<3600?Math.floor(s/60)+" min":Math.floor(s/3600)+"h"; }
function fmtTimer(t){ const s=Math.max(0,Math.floor((now()-t)/1000)); return `⏱ ${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`; }
function tickTimers(){
  document.querySelectorAll(".js-timer").forEach(el=>{ const since=+el.getAttribute("data-since"); el.textContent=fmtTimer(since);
    const age=(now()-since)/1000; el.style.color=age>=PRIORITY_AT?"var(--red)":age>=URGENT_AT?"var(--amber)":"var(--ink-faint)"; });
}

/* ==========================================================================
   Vue mobile (serveurs en salle) — onglets bas : À faire / Plan / Ma salle
   ========================================================================== */
let mobileView = "todo";
function relevantTables(st){
  if(st.role==="manager") return S.tables;
  if(st.role==="serveur"||st.role==="commis") return S.tables.filter(t=>isMine(t));
  if(st.role==="barmaid") return S.tables.filter(t=>{ const o=activeOrder(t.id); return o&&["envoyee","en_attente","prete"].includes(o.status); });
  return [];
}
function todoCount(st){ return st.role==="manager" ? S.tableOverrideRequests.filter(r=>r.status==="pending").length : buildTodos(st).length; }
function renderMobileNav(){
  const st=currentStaff(), n=todoCount(st);
  const items=[{v:"todo",ic:"✦",label:"À faire",b:n},{v:"map",ic:"🗺",label:"Plan",b:0},{v:"tables",ic:"▤",label:"Ma salle",b:0}];
  const nav=document.getElementById("mnav");
  nav.innerHTML=items.map(it=>`<button data-mv="${it.v}" class="${mobileView===it.v?"active":""}"><span class="ic">${it.ic}</span>${it.label}${it.b?`<span class="nbadge">${it.b}</span>`:""}</button>`).join("");
  nav.querySelectorAll("[data-mv]").forEach(b=>b.addEventListener("click",()=>setMobileView(b.getAttribute("data-mv"))));
}
function setMobileView(v){ mobileView=v; document.body.setAttribute("data-mview",v); renderMobileNav(); if(v==="tables") renderMobileTables(); }
function renderMobileTables(){
  const st=currentStaff(), list=relevantTables(st), showP=can(st.role,"view_prices");
  let h=`<div class="panel-b" style="padding-bottom:0"><div class="headline"><span>Ma salle — ${ROLE_LABEL[st.role]}</span><span class="cnt-inline">${list.length}</span></div></div><div class="tabbody" style="padding-top:4px">`;
  if(!list.length) h+=`<div class="muted">Aucune table pour toi pour l'instant.</div>`;
  else h+=list.map(t=>{ const sm=STATUS[t.status],due=tableDue(t.id),a=assignLabel(t);
    return `<button class="mtrow" data-open="${t.id}"><span class="dot" style="background:${sm.color}"></span>
      <span class="l"><b>${svgEsc(t.name)}</b><small>${sm.icon} ${sm.label}${due>0&&showP?` · ${due}€`:""}${a.unassigned?" · ⚠ non assignée":""}</small></span>
      <span class="chev">›</span></button>`; }).join("");
  const foot=[];
  if(can(st.role,"create_order")) foot.push(`<button class="btn primary" data-mact="neworder" style="flex:1;justify-content:center">＋ Commande</button>`);
  if(can(st.role,"request_renfort")) foot.push(`<button class="btn warn" data-mact="renfort" style="flex:1;justify-content:center">🆘 Renfort</button>`);
  if(foot.length) h+=`<div style="display:flex;gap:8px;margin-top:8px">${foot.join("")}</div>`;
  h+=`</div>`;
  const el=document.getElementById("mtables"); el.innerHTML=h;
  el.querySelectorAll("[data-open]").forEach(b=>b.addEventListener("click",()=>openTableDetail(b.getAttribute("data-open"))));
  el.querySelectorAll("[data-mact]").forEach(b=>{ const a=b.getAttribute("data-mact");
    b.addEventListener("click",()=>{ if(a==="neworder") openNewOrder(); else if(a==="renfort") openRenfort(); }); });
}

/* FAB « + Commande » : visible pour qui peut créer une commande (serveur/manager) */
function updateFab(){ document.getElementById("fab").classList.toggle("show", can(currentStaff().role,"create_order")); }

/* ---- boucle & init ---- */
function renderAll(){ updateShiftPill(); renderMap(); renderRail(); renderMobileNav(); renderMobileTables(); updateFab(); tickTimers(); }
document.getElementById("resetBtn").addEventListener("click",resetDemo);
document.getElementById("demoBtn").addEventListener("click",openDemoModal);
document.getElementById("fab").addEventListener("click",()=>openNewOrder());
document.getElementById("bClose").addEventListener("click",()=>{ document.getElementById("banner").style.display="none"; });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

function setEstablishment(){
  document.title = `ServeMap · ${ESTAB.name}`;
  document.getElementById("estabTag").textContent = `${ESTAB.name} · ${ESTAB.city}`;
  document.getElementById("roomName").textContent = ESTAB.name;
  document.getElementById("footnote").textContent =
    `${ESTAB.note}  ·  Touchez une table pour agir ; en manager, glissez une table ou touchez un nom de zone.`;
}
setEstablishment(); load(); escalate(); buildIdentitySelect(); document.body.setAttribute("data-mview",mobileView); setIdentity(currentStaffId);
setInterval(()=>{ if(dragState) return; const ch=escalate(); if(ch){ save(); if(!overlay.classList.contains("on")) renderAll(); } tickTimers(); },1000);
</script>
